<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraudVision - Histórico</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
a {
    text-decoration:none;
    color:inherit;
}
body{
    background:#f5f6fa;
}

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #e5e5e5;
}

.logo{
    height:80px;
    display:flex;
    align-items:center;
    gap:10px;
    padding:20px;
    color:#e61f25;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.menu{
    padding:15px;
}

.menu ul{
    list-style:none;
}

.menu li{
    padding:14px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu li:hover{
    background:#f5f5f5;
}

.menu li.active{
    background:#e61f25;
    color:white;
}

.content{
    flex:1;
}

.topbar{
    background:white;
    height:80px;
    border-bottom:1px solid #ddd;
    display:flex;
    align-items:center;
    padding:0 30px;
}

.main{
    padding:30px;
}

.main h1{
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:12px;
    border:1px solid #eee;
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#fafafa;
}

th{
    text-align:left;
    padding:15px;
    color:#555;
    font-size:14px;
    border-bottom:1px solid #eee;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.status{
    display:flex;
    align-items:center;
    gap:8px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.pending{
    background:#f4b400;
}

.confirmed{
    background:#34a853;
}

.rejected{
    background:#ea4335;
}

.pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:20px;
}

.page{
    width:32px;
    height:32px;
    border-radius:5px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.page.active{
    background:#e61f25;
    color:white;
}

.page:hover{
    background:#f1f1f1;
}

.page.active:hover{
    background:#e61f25;
}

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .main{
        padding:15px;
    }

    table{
        font-size:12px;
    }

}

</style>
</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            FraudVision
        </div>

        <div class="menu">
            <ul>
            <li><i class="fa-solid fa-house"></i> <a href="dashboard.html">Dashboard</a></li>

            <li class="active">
                <i class="fa-solid fa-magnifying-glass"></i>
                <a href="consultar-numero.html">Consultar Número</a>
            </li>

            <li><i class="fa-regular fa-message"></i> <a href="analisar-mensagem.html">Analisar Mensagem</a></li>
            <li><i class="fa-solid fa-triangle-exclamation"></i> <a href="cadastrar-denuncia.html">Denunciar Golpe</a></li>
            <li><i class="fa-solid fa-clock-rotate-left"></i> <a href="historico.html">Histórico</a></li>
            <li><i class="fa-solid fa-arrow-right-from-bracket"></i> <a href="TelaLogin.html">Sair</a></li>
        </ul>
        </div>

    </aside>

    <main class="content">

        <div class="topbar">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="main">

            <h1>Histórico de Denúncias</h1>
            <p class="subtitle">
                Acompanhe suas denúncias enviadas
            </p>

            <div class="card">

                <table id="tabelaHistorico">

    <thead>
        <tr>
            <th>Telefone</th>
            <th>Risco</th>
            <th>Score</th>
            <th>Descrição</th>
        </tr>
    </thead>

    <tbody id="corpoTabela">

    </tbody>

</table>

            </div>

        </div>

    </main> 
<script>

async function carregarHistorico() {

    const resposta =
        await fetch("http://localhost:8080/denuncias");

    const denuncias =
        await resposta.json();

    const tabela =
        document.getElementById("corpoTabela");

    tabela.innerHTML = "";

    denuncias.forEach(denuncia => {

        tabela.innerHTML += `
            <tr>
                <td>${denuncia.telefone}</td>
                <td>${denuncia.risco}</td>
                <td>${denuncia.score}%</td>
                <td>${denuncia.descricao}</td>
            </tr>
        `;
    });
}
carregarHistorico();

</script>
</body>
